<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VocalPulse — Secure Login</title>
    <meta name="description" content="Sign into the VocalPulse biometric authentication platform." />
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: var(--color-black);
            margin: 0;
        }

        .login-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* Left Panel */
        .login-left {
            background: var(--color-black);
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .login-left::after {
            content: '';
            position: absolute;
            top: -120px;
            left: -120px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-hero-text {
            font-family: var(--font-mono-display);
            font-size: clamp(4rem, 7vw, 6.5rem);
            text-transform: uppercase;
            color: var(--color-yellow);
            line-height: 0.95;
            letter-spacing: -0.01em;
            margin-top: auto;
            margin-bottom: 3rem;
            position: relative;
            z-index: 1;
        }

        .login-features {
            list-style: none;
            padding: 0;
            position: relative;
            z-index: 1;
        }

        .login-features li {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            transition: var(--transition);
        }

        .login-features li:hover {
            color: white;
        }

        .login-features li::before {
            content: '→';
            color: var(--color-yellow);
            font-size: 1rem;
        }

        .login-footer-tags {
            display: flex;
            gap: 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 2.5rem;
        }

        .login-footer-tags span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-footer-tags .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        /* Right Panel */
        .login-right {
            background: var(--color-cream);
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
        }

        .login-right-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-logo svg {
            width: 24px;
            height: 24px;
            color: var(--color-black);
        }

        .login-logo span {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .login-badge {
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: var(--color-primary);
            color: white;
            padding: 4px 10px;
            border-radius: 2px;
        }

        .login-form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 480px;
        }

        .login-title {
            font-family: var(--font-mono-display);
            font-size: 3.5rem;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 2.5rem;
            letter-spacing: -0.01em;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.55);
            margin-bottom: 0.6rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(0, 0, 0, 0.12);
            background: white;
            font-family: var(--font-display);
            font-size: 0.95rem;
            color: var(--color-black);
            border-radius: 3px;
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--color-black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
        }

        .form-input::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .form-input {
            padding-right: 48px;
        }

        .input-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.45);
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .input-eye:hover {
            color: var(--color-black);
        }

        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--color-black);
            cursor: pointer;
        }

        .form-checkbox label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.55);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-primary);
            transition: var(--transition);
        }

        .forgot-link:hover {
            opacity: 0.7;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--color-black);
            color: white;
            font-family: var(--font-mono-display);
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2rem;
        }

        .btn-submit:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
        }

        .divider-text {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.4);
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 12px;
            border: 2px solid rgba(0, 0, 0, 0.12);
            background: white;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-black);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-social:hover {
            border-color: var(--color-black);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
        }

        .login-footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(0, 0, 0, 0.45);
        }

        .login-footer-text a {
            font-weight: 900;
            letter-spacing: 0.05em;
            text-decoration: underline;
            text-decoration-offset: 3px;
            color: var(--color-black);
        }

        @media (max-width: 768px) {
            .login-layout {
                grid-template-columns: 1fr;
            }

            .login-left {
                padding: 2.5rem 1.5rem;
                min-height: auto;
            }

            .login-hero-text {
                font-size: 3.5rem;
                margin-top: 2rem;
            }

            .login-right {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-layout">

        <!-- Left Panel -->
        <div class="login-left">
            <div class="login-logo" style="color: rgba(255,255,255,0.8);">
                <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"
                    style="color: var(--color-yellow);">
                    <path
                        d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"
                        fill="currentColor" />
                </svg>
            </div>

            <div>
                <div class="login-hero-text">BIOLOGY<br />CANNOT<br />BE<br />FORGED.</div>
                <ul class="login-features">
                    <li>Neural Voice Encryption</li>
                    <li>Liveness Detection API</li>
                    <li>Zero-Knowledge Biometrics</li>
                </ul>
                <div class="login-footer-tags">
                    <span>Validated</span>
                    <span class="sep">·</span>
                    <span>Tamil</span>
                    <span class="sep">·</span>
                    <span>Malayalam</span>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <div class="login-right-header">
                <div class="login-logo">
                    <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"
                            fill="currentColor" />
                    </svg>
                    <span>VocalPulse</span>
                </div>
                <span class="login-badge">Secure Login</span>
            </div>

            <div class="login-form-container">
                <h1 class="login-title">SIGN IN.</h1>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input class="form-input" type="email" id="email" name="email" placeholder="user@vocalpulse.ai"
                            required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Authentication Key</label>
                        <div class="input-wrapper">
                            <input class="form-input" type="password" id="password" name="password"
                                placeholder="••••••••••••" required />
                            <button type="button" class="input-eye" id="togglePw"
                                aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-checkbox">
                            <input type="checkbox" id="remember" name="remember" />
                            <label for="remember">Remember Me</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-submit">Access Dashboard</button>
                </form>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">External Auth</span>
                    <div class="divider-line"></div>
                </div>

                <div class="social-btns">
                    <button class="btn-social" onclick="socialLogin('google')">
                        <!-- Google Icon -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button class="btn-social" onclick="socialLogin('microsoft')">
                        <!-- Microsoft Icon -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#F25022" d="M1 1h10v10H1z" />
                            <path fill="#7FBA00" d="M13 1h10v10H13z" />
                            <path fill="#00A4EF" d="M1 13h10v10H1z" />
                            <path fill="#FFB900" d="M13 13h10v10H13z" />
                        </svg>
                        Microsoft
                    </button>
                </div>

                <p class="login-footer-text">No account? <a href="#">Create One →</a></p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePw = document.getElementById('togglePw');
        const pwInput = document.getElementById('password');
        togglePw.addEventListener('click', () => {
            const isPassword = pwInput.type === 'password';
            pwInput.type = isPassword ? 'text' : 'password';
            togglePw.textContent = isPassword ? '🙈' : '👁';
        });

        // Login form submission
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            btn.textContent = 'AUTHENTICATING...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        }

        function socialLogin(provider) {
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} OAuth would be triggered here.`);
        }
    </script>
</body>

</html>
